<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelNotes</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- === DASHBOARD MENU === -->
    <div class="container dark-container" id="main-menu">
        <div class="top-nav">
            <div class="brand-logo">ReelNotes</div>
            <div class="user-profile">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Username</span>
            </div>
        </div>
  
        <div class="dashboard-header" style="align-items: flex-start; margin-bottom: 30px;">
            <div class="header-left">
                <p style="color: #38BDF8; font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px;">Dashboard</p>
                <h1 class="glow-text" style="font-size: 2.2rem; margin-bottom: 5px;">Welcome back, <span style="color: #38BDF8;">Lorenzo</span></h1>
                <p class="subtitle" style="font-size: 1rem;">Select a subject to manage contents or start the AI reel.</p>
            </div>
            <div class="action-group" id="default-actions" style="margin-top: 10px;">
                <button id="show-add-modal" class="btn-primary" style="padding: 12px 24px; font-size: 1rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);">+ Add Subject</button>
                <button id="toggle-edit-mode" class="btn-ghost" style="padding: 12px 24px; font-size: 1rem; border-radius: 12px;">Edit Dashboard</button>
            </div>
            <div class="action-group hidden" id="edit-actions" style="margin-top: 10px;">
                <button id="delete-selected" class="btn-ghost-danger" style="padding: 12px 24px; font-size: 1rem; border-radius: 12px;">Delete Selected (0)</button>
                <button id="cancel-edit-mode" class="btn-ghost" style="padding: 12px 24px; font-size: 1rem; border-radius: 12px;">Done</button>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="class-search" class="dark-input search-bar" placeholder="Search subjects...">
        </div>

        <div id="class-buttons" class="bento-grid"></div>
    </div>

    <!-- === MODALS === -->
    <!-- Add Subject Modal -->
    <div id="custom-add-modal" class="dark-overlay hidden">
        <div class="dark-modal-box">
            <h2 style="color: #F8FAFC; margin-top: 0;">Add New Subject</h2>
            <input type="text" id="new-subject-input" class="dark-input full-width" placeholder="e.g., Object Oriented Programming">
            <div class="modal-buttons">
                <button id="cancel-add" class="btn-ghost">Cancel</button>
                <button id="confirm-add" class="btn-primary">Create</button>
            </div>
        </div>
    </div>

    <!-- Custom Confirmation Modal -->
    <div id="custom-confirm-modal" class="dark-overlay hidden">
        <div class="dark-modal-box">
            <h2 style="margin-top: 0; color: #F8FAFC;">Are you sure?</h2>
            <p id="confirm-modal-message" style="color: #94A3B8; margin-bottom: 20px;">Do you really want to do this?</p>
            <div class="modal-buttons">
                <button id="cancel-confirm-btn" class="btn-ghost">Cancel</button>
                <button id="accept-confirm-btn" class="btn-ghost-danger" style="background-color: #EF4444; color: white;">Delete</button>
            </div>
        </div>
    </div>

    <!-- === THE WORKSPACE === -->
    <div class="container dark-container hidden" id="workspace-container" style="max-width: 100%; width: 100%; padding: 0; display: flex; height: 85vh; border-radius: 16px; overflow: hidden; border: 1px solid #334155;">
        
        <!-- SIDEBAR -->
        <div class="workspace-sidebar" style="width: 260px; background: #0F172A; border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 25px;">
            <h2 id="workspace-title" class="glow-text" style="font-size: 1.5rem; margin-top: 0; margin-bottom: 30px; word-wrap: break-word;">Subject</h2>
            
            <div class="sidebar-nav" style="display: flex; flex-direction: column; gap: 10px; flex-grow: 1;">
                <button class="nav-item active" id="nav-text-notes">Text Notes</button>
                <button class="nav-item" id="nav-picture-notes">Picture Notes</button>
            </div>

            <div class="sidebar-footer" style="margin-top: auto; display: flex; flex-direction: column; gap: 15px;">
                <button id="start-reel-btn" class="btn-primary" style="width: 100%; font-weight: 800; padding: 15px;">▶ START REEL</button>
                <button id="back-to-dashboard" class="btn-ghost" style="width: 100%; font-size: 0.85rem;">&larr; Back to Dashboard</button>
            </div>
        </div>

        <!-- MAIN CONTENT AREA -->
        <div class="workspace-content" style="flex: 1; background: #1E293B; padding: 40px; overflow-y: auto;">
            
            <!-- TEXT NOTES VIEW -->
            <div id="view-text-notes" class="content-view">
                <h2 style="margin-top: 0; color: #F8FAFC; margin-bottom: 20px;">Text Notes</h2>
                
                <input type="text" id="text-note-title" class="dark-input full-width" placeholder="Note Title (e.g., Chapter 1: Introduction)" style="margin-bottom: 10px; font-weight: bold; font-size: 1.1rem;">
                <textarea id="text-note-input" class="dark-input full-width" rows="5" placeholder="Paste or type your note content here..."></textarea>
                
                <div style="display: flex; gap: 10px; margin-top: 15px; align-items: center; flex-wrap: wrap;">
                    <button id="save-text-note" class="btn-primary">Save Note</button>
                    <button id="toggle-select-notes" class="btn-ghost">Select Notes</button>
                    <button id="sort-text-notes" class="btn-ghost">Sort A-Z</button>
                    
                    <div id="dynamic-action-bar" class="hidden" style="display: flex; gap: 10px;">
                        <button id="edit-selected-note" class="btn-ghost">Edit Selected</button>
                        <button id="delete-selected-notes" class="btn-ghost-danger">Delete Selected</button>
                    </div>
                </div>

                <input type="text" id="note-search" class="dark-input full-width" placeholder="Search notes..." style="margin-top: 25px;">
                <ul id="text-notes-list" class="dark-list" style="margin-top: 20px;"></ul>
            </div>

            <!-- PICTURE NOTES VIEW -->
            <div id="view-picture-notes" class="content-view hidden">
                <h2 style="margin-top: 0; color: #F8FAFC; margin-bottom: 20px;">Picture Notes</h2>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <input type="file" id="image-input" accept="image/*" class="dark-input" style="flex-grow: 1;">
                    <button id="save-image-note" class="btn-primary" style="padding: 15px 25px;">Upload</button>
                </div>
                <ul id="picture-notes-list" class="picture-grid"></ul>
            </div>

        </div>
    </div>  

    <!-- === FULLSCREEN OVERLAYS === -->
    <div id="photo-modal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modal-img">
        <div id="caption"></div>
        <div class="modal-controls">
            <button id="zoom-in" class="btn-primary">+</button>
            <button id="zoom-out" class="btn-primary">-</button>
        </div>
    </div>

    <div id="reel-container" class="hidden">
        <button id="close-reel-btn">X</button>
        <video id="reel-video" autoplay loop muted>
            <source src="parkour.mp4" type="video/mp4">
        </video>
        <div id="reel-text-overlay">LOADING...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
