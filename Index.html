<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelNotes v2.0</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container dark-container" id="main-menu">

        <div class="top-nav">
            <div class="brand-logo">ReelNotes</div>
            <div class="user-profile">
                <!-- Simple SVG icon for the user -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Username</span>
            </div>
        </div>
  
        <div class="dashboard-header" style="align-items: flex-start; margin-bottom: 30px;">
            <div class="header-left">
                <p style="color: #38BDF8; font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px;">Dashboard</p>
                <h1 class="glow-text" style="font-size: 2.2rem; margin-bottom: 5px;">Welcome back, <span style="color: #38BDF8;">Lorenzo</span></h1>
                <p class="subtitle" style="font-size: 1rem;">Select a subject to manage contents or start the AI reel.</p>
            </div>
            <div class="action-group" id="default-actions" style="margin-top: 10px;">
                <button id="show-add-modal" class="btn-primary" style="padding: 12px 24px; font-size: 1rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);">+ Add Subject</button>
                <button id="toggle-edit-mode" class="btn-ghost" style="padding: 12px 24px; font-size: 1rem; border-radius: 12px;">Edit Dashboard</button>
            </div>
            <div class="action-group hidden" id="edit-actions" style="margin-top: 10px;">
                <button id="delete-selected" class="btn-ghost-danger" style="padding: 12px 24px; font-size: 1rem; border-radius: 12px;">Delete Selected (0)</button>
                <button id="cancel-edit-mode" class="btn-ghost" style="padding: 12px 24px; font-size: 1rem; border-radius: 12px;">Done</button>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="class-search" class="dark-input search-bar" placeholder="Search subjects...">
        </div>

        <div id="class-buttons" class="bento-grid">
            </div>
    </div>

    <div id="custom-add-modal" class="dark-overlay hidden">
        <div class="dark-modal-box">
            <h2>Add New Subject</h2>
            <input type="text" id="new-subject-input" class="dark-input full-width" placeholder="e.g., Object Oriented Programming">
            <div class="modal-buttons">
                <button id="cancel-add" class="btn-ghost">Cancel</button>
                <button id="confirm-add" class="btn-primary">Create</button>
            </div>
        </div>
    </div>

    <div class="container dark-container hidden" id="notes-menu">
        <h1 id="class-title" class="glow-text">Class Name</h1>
        <button id="back-to-classes" class="btn-ghost" style="margin-bottom: 20px;">← Back to Dashboard</button>
        <div class="bento-grid">
            <button id="text-notes" class="subject-btn style-text">Text Notes</button>
            <button id="picture-notes" class="subject-btn style-pic">Picture Notes</button>
        </div>
    </div>

    <div class="container dark-container hidden" id="text-notes-menu">
        <h2 class="glow-text">Text Notes</h2>
        <button id="back-to-notes" class="btn-ghost">← Back</button>
        
        <div style="margin-top: 20px;">
            <textarea id="text-note-input" class="dark-input full-width" rows="4" placeholder="Type your note here..."></textarea>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="save-text-note" class="btn-primary">Save Note</button>
                <button id="edit-text-note" class="btn-ghost">Edit Selected</button>
                <button id="delete-text-note" class="btn-ghost-danger">Delete Selected</button>
            </div>
        </div>

        <input type="text" id="note-search" class="dark-input full-width" placeholder="Search notes..." style="margin-top: 20px;">
        <button id="sort-text-notes" class="btn-ghost" style="margin-top: 10px;">Sort A-Z</button>
        
        <ul id="text-notes-list" class="dark-list"></ul>
        
        <button id="start-reel-btn" class="btn-primary huge-btn" style="width: 100%; margin-top: 20px;">START REEL MODE</button>
    </div>

    <div class="container dark-container hidden" id="picture-notes-menu">
        <h2 class="glow-text">Picture Notes</h2>
        <button id="back-to-notes-pictures" class="btn-ghost">← Back</button>
        <div style="margin-top: 20px;">
            <input type="file" id="image-input" accept="image/*" class="dark-input">
            <button id="save-image-note" class="btn-primary" style="margin-top: 10px;">Upload Image</button>
        </div>
        <ul id="picture-notes-list" class="picture-grid"></ul>
    </div>

    <div id="photo-modal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modal-img">
        <div id="caption"></div>
        <div class="modal-controls">
            <button id="zoom-in" class="btn-primary">+</button>
            <button id="zoom-out" class="btn-primary">-</button>
        </div>
    </div>

    <div id="reel-container" class="hidden">
        <button id="close-reel-btn">X</button>
        <video id="reel-video" autoplay loop muted>
            <source src="parkour.mp4" type="video/mp4">
        </video>
        <div id="reel-text-overlay">LOADING...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
